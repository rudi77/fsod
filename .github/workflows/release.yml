name: release

# Baut bei jedem Versions-Tag (z. B. v0.1.0) eigenständige agentkit-Executables für
# Windows & Linux — sowohl die Rust- als auch die Python-Variante — und hängt sie als
# Release-Artefakte an. Manuell auslösbar via "Run workflow" (dann nur Artefakte).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.variant }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            variant: rust
            asset: agentkit-rust-linux-x86_64
          - os: windows-latest
            variant: rust
            asset: agentkit-rust-windows-x86_64.exe
          - os: ubuntu-latest
            variant: python
            asset: agentkit-python-linux-x86_64
          - os: windows-latest
            variant: python
            asset: agentkit-python-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------- Rust
      - name: Rust-Toolchain
        if: matrix.variant == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust-Build (mit TUI + PDF)
        if: matrix.variant == 'rust'
        run: cargo build --release --manifest-path agent_framework_rs/Cargo.toml --bin agentkit --features "tui pdf"

      # -------------------------------------------------------------- Python
      - name: Python einrichten
        if: matrix.variant == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: PyInstaller-Build
        if: matrix.variant == 'python'
        run: |
          python -m pip install --upgrade pip pyinstaller
          python -m pip install ./agent_framework
          python -m PyInstaller --onefile --name agentkit --clean --noconfirm \
            agent_framework/pyinstaller_entry.py

      # --------------------------------------------------- Artefakt benennen
      - name: Binary einsammeln
        shell: bash
        run: |
          mkdir -p staging
          if [ "${{ matrix.variant }}" = "rust" ]; then
            if [ "${{ runner.os }}" = "Windows" ]; then
              src="agent_framework_rs/target/release/agentkit.exe"
            else
              src="agent_framework_rs/target/release/agentkit"
            fi
          else
            if [ "${{ runner.os }}" = "Windows" ]; then
              src="dist/agentkit.exe"
            else
              src="dist/agentkit"
            fi
          fi
          cp "$src" "staging/${{ matrix.asset }}"
          ls -la staging

      - name: Smoke-Test
        shell: bash
        run: ./staging/${{ matrix.asset }} --demo "Was ist 17 + 25?"

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: staging/${{ matrix.asset }}
          if-no-files-found: error

  # Sammelt alle Binaries und hängt sie an den Release (nur bei Tags).
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release anlegen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
